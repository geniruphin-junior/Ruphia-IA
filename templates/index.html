<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruphia 3.0</title>

    <!-- Bonne méthode -->

    <style>
      :root {
        --glass-bg: rgba(28, 35, 36, 0.242);
        --glass-border: rgba(255, 255, 255, 0.014);
        --accent: #8ab4f8;
        --radius-main: 28px;
      }
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: "Segoe UI", sans-serif;
        overflow: hidden;
      }

      body {
        background: url("/static/logo_gemini.png") no-repeat center center fixed;
        overflow: hidden;
        background-color: black;
        background-size: 1000px;
      }
      /* --- FENÊTRE IA --- */
      .ai-overlay {
        position: absolute;
        top: 19px;
        right: 30px;
        bottom: 30px;
        width: 350px;
        background: var(--glass-bg);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-main);
        display: flex;
        flex-direction: column;
        box-shadow: 0 0px 18px rgb(99, 183, 240);
      }

      .chat-area {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        scroll-behavior: smooth;
      }

      .msg {
        padding: 12px 16px;
        border-radius: 20px;
        font-size: 14px;
        max-width: 85%;
        color: white;
        animation: fadeIn 0.3s ease;
      }

      .ai-msg {
        background: whitesmoke;
        color: green;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        box-shadow: 0 0px 15px lch(61.66% 59.87 273.43);
      }
      .user-msg {
        background: var(--accent);
        color: rgba(0, 0, 0, 0.952);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* --- INPUT --- */
      .input-zone {
        padding: 15px;
        border-top: 1px solid var(--glass-border);
      }
      .pill-input {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 30px;
        padding: 5px 10px 5px 20px;
        display: flex;
        align-items: center;
        border: 1px solid var(--glass-border);
      }

      input {
        background: transparent;
        border: none;
        color: white;
        flex: 1;
        height: 35px;
        outline: none;
        font-size: 14px;
      }

      .send-btn {
        background: var(--accent);
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }
      .send-btn:hover {
        transform: scale(1.1);
      }
      .message-animation {
        animation: fadInslide 0.4s ease-out forwards;
        opacity: 0;
        transform: translateY(10px);
      }
      @keyframes fadeInslide {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #visualizer {
        display: block;
        margin: 0 auto;
        background: transparent;
        filter: drop-shadow(0 0 5px #00a2ff); /* Effet de lueur bleue */
      }
    </style>
  </head>
  <body>
    <div class="ai-overlay">
      <div
        style="
          padding: 20px;
          text-align: center;
          border-bottom: 1px solid var(--glass-border);
          font-weight: 600;
          color: #8ab4f8;
        "
      >
        Ruphia-future
      </div>

      <div class="chat-area" id="chatBox">
        <div class="msg ai-msg">
          Ici c'est Ruphia l'ia du king of hackers qui est son fondateur Ruphin.
          Qu'attents tu pour l'utiliser car elle gratuite et local
        </div>
      </div>
      <div id="typing-indicator" style="display: none; color: aqua">
        <span>.</span><span>.</span><span>.</span><span>.</span>
      </div>

      <div class="input-zone">
        <form id="chatForm" class="pill-input">
          <input
            type="text"
            id="userInput"
            placeholder="Écrire à Ruphia"
            autocomplete="off"
            requierd="requierd"
          />
          <button type="submit" class="send-btn">➤</button>
        </form>
      </div>
    </div>
    <canvas id="fond-ia"></canvas>
    <canvas id="visualizer" width="300" height="50"></canvas>

    <!-- la touche magique avec du javascript -->
    <script>
      const chatForm = document.getElementById("chatForm");
      const userInput = document.getElementById("userInput");
      const chatBox = document.getElementById("chatBox");

      chatForm.addEventListener("submit", function (e) {
        e.preventDefault(); // Empêche le rechargement de la page

        const message = userInput.value.trim();
        if (message === "") return;

        // 1. Ajouter le message de l'utilisateur
        addMessage(message, "user-msg");
        userInput.value = ""; // Vide le champ

        // 2. Simulation d'une réponse de l'IA après 1 seconde

        fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            message: message,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            addMessage(data.reply, "ai-msg");
          })
          .catch((error) => {
            addMessage("serveur déconnecté ", "ai-msg");
          });
      });

      function addMessage(text, className) {
        const div = document.createElement("div");
        div.classList.add("msg", className);
        div.textContent = text;
        chatBox.appendChild(div);

        // Scroll automatique vers le bas
        chatBox.scrollTop = chatBox.scrollHeight;
      }
      function envoyerMessage() {
        const input = document.querySelector(
          'input[placeholder="Écrire à Ruphia"]',
        );
        if (input.value.trim() !== "") {
          // 1. Afficher le message de l'utilisateur
          // 2. Afficher l'indicateur "Ruphia réfléchit..."
          document.getElementById("typing-indicator").style.display = "block";

          // 3. Simuler un délai de réponse
          setTimeout(() => {
            document.getElementById("typing-indicator").style.display = "none";
            // 4. Afficher la réponse de Ruphia avec la classe .message-animation
          }, 2000);
        }
      }
      function adapterAmbianceSite() {
        const heure = new Date().getHours();
        const corpsPage = document.body;
        // On vérifie l'heure (Nuit entre 18h et 6h du matin)
        if (heure >= 18 || heure < 6) {
          // --- MODE NUIT : BLEU FONCÉ ---
          corpsPage.style.backgroundColor = "#001a33"; // Un beau bleu nuit
          corpsPage.style.transition = "background-color 2s ease"; // Animation douce
          console.log("Ambiance Nuit activée");
        } else {
          // --- MODE whithe : NOIR ---
          corpsPage.style.backgroundColor = " black"; //
          corpsPage.style.transition = "background-color 2s ease";
          console.log("Ambiance Jour activée");
          alert("il est jour,le bon moment pour échanger tu ne trouve pas ?");
        }
      }

      // Lancer la fonction au chargement de la page
      window.onload = adapterAmbianceSite;
      let audioContext, analyser, dataArray, canvas, canvasCtx;
    </script>
  </body>
</html>
